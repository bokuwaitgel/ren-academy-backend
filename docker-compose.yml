services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ren-academy-backend:latest
    container_name: ren-backend
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      WORKERS: 4
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/docs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    mem_limit: 1g
    mem_reservation: 512m
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 512m
